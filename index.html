<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fener — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0a0e1a;
    --bg-violet:#241246;
    --bg-teal:#062e2c;
    --glass:rgba(255,255,255,.055);
    --glass-border:rgba(255,255,255,.14);
    --text-primary:#f3f1ff;
    --text-muted:#9aa3bd;
    --accent:#ffb454;
    --accent-soft:rgba(255,180,84,.35);
    --danger:#ff7a7a;
    --radius:22px;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Inter',sans-serif;
    color:var(--text-primary);
    background:
      radial-gradient(ellipse 900px 600px at 15% 8%, var(--bg-violet), transparent 60%),
      radial-gradient(ellipse 900px 700px at 90% 90%, var(--bg-teal), transparent 60%),
      var(--bg-deep);
    overflow:hidden;
    position:relative;
  }

  /* ambient starfield / fireflies */
  #fireflies{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
  }

  /* moon */
  .moon{
    position:fixed;
    top:8%;
    right:10%;
    width:90px;
    height:90px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #fff6df, #ffdca0 55%, #e8b55f 100%);
    box-shadow:0 0 60px 10px rgba(255,220,160,.35), 0 0 140px 40px rgba(255,180,84,.12);
    opacity:.9;
  }

  .ridge{
    position:fixed;
    left:0; right:0; bottom:0;
    height:38vh;
    background:linear-gradient(to top, rgba(6,20,20,.9), transparent);
    z-index:0;
  }

  .lang-toggle{
    position:fixed;
    top:24px;
    right:24px;
    z-index:5;
    display:flex;
    background:var(--glass);
    border:1px solid var(--glass-border);
    border-radius:999px;
    padding:4px;
    backdrop-filter:blur(14px);
    gap:2px;
  }
  .lang-toggle button{
    border:none;
    background:transparent;
    color:var(--text-muted);
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:12.5px;
    letter-spacing:.03em;
    padding:7px 14px;
    border-radius:999px;
    cursor:pointer;
    transition:background .25s ease, color .25s ease;
  }
  .lang-toggle button.active{
    background:linear-gradient(135deg, var(--accent), #ff8f5e);
    color:#22140a;
  }

  .card{
    position:relative;
    z-index:2;
    width:380px;
    max-width:90vw;
    padding:38px 34px 30px;
    border-radius:var(--radius);
    background:var(--glass);
    border:1px solid var(--glass-border);
    backdrop-filter:blur(22px) saturate(1.4);
    -webkit-backdrop-filter:blur(22px) saturate(1.4);
    box-shadow:0 30px 70px -20px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.06);
    transform-style:preserve-3d;
    transition:transform .12s ease-out;
  }
  .card::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:var(--radius);
    padding:1px;
    background:linear-gradient(160deg, rgba(255,255,255,.35), transparent 40%);
    -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
    pointer-events:none;
  }

  .eyebrow{
    font-size:11px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--accent);
    font-weight:600;
    margin:0 0 10px;
  }

  h1{
    font-family:'Fraunces',serif;
    font-weight:500;
    font-size:32px;
    line-height:1.1;
    margin:0 0 8px;
  }

  .subtitle{
    color:var(--text-muted);
    font-size:14px;
    margin:0 0 28px;
  }

  .field{
    position:relative;
    margin-bottom:16px;
    border:1px solid var(--glass-border);
    border-radius:14px;
    background:rgba(255,255,255,.035);
    transition:border-color .2s ease, box-shadow .2s ease;
  }
  .field:focus-within{
    border-color:var(--accent-soft);
    box-shadow:0 0 0 3px rgba(255,180,84,.12);
  }
  .field label{
    display:block;
    font-size:11px;
    letter-spacing:.04em;
    text-transform:uppercase;
    color:var(--text-muted);
    padding:10px 16px 0;
  }
  .field input{
    width:100%;
    background:transparent;
    border:none;
    outline:none;
    color:var(--text-primary);
    font-family:'Inter',sans-serif;
    font-size:15.5px;
    padding:4px 16px 12px;
  }
  .field input::placeholder{color:rgba(154,163,189,.55);}
  .toggle-pass{
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-30%);
    background:none;
    border:none;
    color:var(--text-muted);
    cursor:pointer;
    padding:6px;
    display:flex;
  }
  .toggle-pass:hover{color:var(--text-primary);}

  .row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin:6px 0 22px;
    font-size:13px;
  }
  .remember{
    display:flex;
    align-items:center;
    gap:8px;
    color:var(--text-muted);
    cursor:pointer;
    user-select:none;
  }
  .remember input{
    appearance:none;
    width:16px;height:16px;
    border-radius:5px;
    border:1px solid var(--glass-border);
    background:rgba(255,255,255,.04);
    display:grid;
    place-content:center;
    cursor:pointer;
  }
  .remember input:checked{background:var(--accent); border-color:var(--accent);}
  .remember input:checked::after{
    content:"";
    width:4px;height:8px;
    border:solid #22140a;
    border-width:0 2px 2px 0;
    transform:rotate(45deg) translate(-1px,-1px);
  }
  .row a{color:var(--accent); text-decoration:none;}
  .row a:hover{text-decoration:underline;}

  .btn-primary{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg, var(--accent), #ff8f5e);
    color:#241205;
    font-weight:700;
    font-size:15px;
    letter-spacing:.01em;
    cursor:pointer;
    position:relative;
    box-shadow:0 12px 30px -10px rgba(255,150,80,.55);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .btn-primary:hover{transform:translateY(-1px); box-shadow:0 16px 34px -8px rgba(255,150,80,.65);}
  .btn-primary:active{transform:translateY(0);}
  .btn-primary.is-loading .btn-label{visibility:hidden;}
  .btn-primary .spinner{
    display:none;
    position:absolute;
    inset:0;
    align-items:center;
    justify-content:center;
  }
  .btn-primary.is-loading .spinner{display:flex;}
  .spinner span{
    width:16px;height:16px;
    border-radius:50%;
    border:2px solid rgba(36,18,5,.3);
    border-top-color:#241205;
    animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .divider{
    display:flex;
    align-items:center;
    gap:12px;
    margin:24px 0 18px;
    color:var(--text-muted);
    font-size:12px;
  }
  .divider::before, .divider::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--glass-border);
  }

  .socials{
    display:flex;
    gap:10px;
    margin-bottom:22px;
  }
  .socials button{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding:11px;
    border-radius:12px;
    border:1px solid var(--glass-border);
    background:rgba(255,255,255,.03);
    color:var(--text-primary);
    font-size:13.5px;
    font-weight:600;
    cursor:pointer;
    transition:background .2s ease, transform .15s ease;
  }
  .socials button:hover{background:rgba(255,255,255,.07); transform:translateY(-1px);}

  .footer-link{
    text-align:center;
    font-size:13.5px;
    color:var(--text-muted);
  }
  .footer-link a{color:var(--accent); text-decoration:none; font-weight:600;}
  .footer-link a:hover{text-decoration:underline;}

  .error-msg{
    display:none;
    font-size:12.5px;
    color:var(--danger);
    margin:-6px 0 14px;
  }
  .error-msg.show{display:block;}

  @media (prefers-reduced-motion: reduce){
    .card, .btn-primary, .socials button{transition:none;}
  }

  @media (max-width:420px){
    .moon{width:60px; height:60px; top:5%; right:8%;}
    .card{padding:30px 22px 24px;}
    h1{font-size:26px;}
  }
</style>
</head>
<body>

<canvas id="fireflies"></canvas>
<div class="moon"></div>
<div class="ridge"></div>

<div class="lang-toggle" role="group" aria-label="Language">
  <button type="button" data-lang="tr" class="active">TR</button>
  <button type="button" data-lang="en">EN</button>
</div>

<form class="card" id="loginForm" autocomplete="off">
  <p class="eyebrow" data-i18n="eyebrow">Geceye Hoş Geldin</p>
  <h1 data-i18n="title">Tekrar hoş geldin</h1>
  <p class="subtitle" data-i18n="subtitle">Fener'e devam etmek için giriş yap</p>

  <div class="field">
    <label for="username" data-i18n="usernameLabel">Kullanıcı adı</label>
    <input id="username" name="username" type="text" placeholder="nightrider" required>
  </div>

  <div class="field">
    <label for="password" data-i18n="passwordLabel">Şifre</label>
    <input id="password" name="password" type="password" placeholder="••••••••" required>
    <button type="button" class="toggle-pass" id="togglePass" aria-label="Show password">
      <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
  </div>

  <p class="error-msg" id="errorMsg" data-i18n="errorMsg">Kullanıcı adı veya şifre hatalı.</p>

  <div class="row">
    <label class="remember">
      <input type="checkbox" id="remember">
      <span data-i18n="remember">Beni hatırla</span>
    </label>
    <a href="#" data-i18n="forgot">Şifreni mi unuttun?</a>
  </div>

  <button type="submit" class="btn-primary" id="submitBtn">
    <span class="btn-label" data-i18n="signIn">Giriş yap</span>
    <span class="spinner"><span></span></span>
  </button>

  <div class="divider"><span data-i18n="divider">veya şununla devam et</span></div>

  <div class="socials">
    <button type="button">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#EA4335" d="M12 10.2v3.9h5.5c-.24 1.4-1.7 4.1-5.5 4.1-3.3 0-6-2.7-6-6.2s2.7-6.2 6-6.2c1.9 0 3.1.8 3.9 1.5l2.7-2.6C16.9 3.1 14.7 2 12 2 6.9 2 2.8 6.1 2.8 11.2S6.9 20.4 12 20.4c6.9 0 9.5-4.8 9.5-7.3 0-.5 0-.9-.1-1.3H12Z"/></svg>
      Google
    </button>
    <button type="button">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M16.365 1.43c0 1.14-.462 2.05-1.15 2.75-.74.75-1.94 1.34-2.94 1.26-.13-1.1.44-2.24 1.13-2.95.75-.79 2.03-1.36 2.96-1.06Zm3.61 16.86c-.34.78-.75 1.53-1.26 2.24-.7 1-1.42 1.99-2.56 2.01-1.12.02-1.48-.66-2.76-.66-1.28 0-1.68.64-2.74.68-1.1.04-1.94-1.08-2.65-2.07-1.44-2.02-2.55-5.7-1.07-8.19.74-1.24 2.05-2.02 3.48-2.04 1.08-.02 2.1.72 2.76.72.66 0 1.9-.89 3.2-.76.55.02 2.08.22 3.06 1.66-.08.05-1.83 1.06-1.81 3.16.02 2.51 2.2 3.35 2.35 3.25Z"/></svg>
      Apple
    </button>
  </div>

  <p class="footer-link"><span data-i18n="newHere">Fener'de yeni misin?</span> <a href="#" data-i18n="createAccount">Hesap oluştur</a></p>
</form>

<script>
/* ---------- i18n ---------- */
const dict = {
  tr:{
    eyebrow:"Geceye Hoş Geldin",
    title:"Tekrar hoş geldin",
    subtitle:"Fener'e devam etmek için giriş yap",
    usernameLabel:"Kullanıcı adı",
    passwordLabel:"Şifre",
    remember:"Beni hatırla",
    forgot:"Şifreni mi unuttun?",
    signIn:"Giriş yap",
    divider:"veya şununla devam et",
    newHere:"Fener'de yeni misin?",
    createAccount:"Hesap oluştur",
    errorMsg:"Kullanıcı adı veya şifre hatalı."
  },
  en:{
    eyebrow:"Welcome to the night",
    title:"Welcome back",
    subtitle:"Sign in to continue to Fener",
    usernameLabel:"Username",
    passwordLabel:"Password",
    remember:"Remember me",
    forgot:"Forgot password?",
    signIn:"Sign in",
    divider:"or continue with",
    newHere:"New to Fener?",
    createAccount:"Create account",
    errorMsg:"Incorrect username or password."
  }
};

function setLang(lang){
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key = el.getAttribute('data-i18n');
    if(dict[lang][key]) el.textContent = dict[lang][key];
  });
  document.querySelectorAll('.lang-toggle button').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
  document.getElementById('username').placeholder = lang === 'tr' ? 'kullanici_adi' : 'username';
  localStorage.setItem && null; // artifacts: no localStorage usage, kept in-memory only
}

document.querySelectorAll('.lang-toggle button').forEach(btn=>{
  btn.addEventListener('click', ()=> setLang(btn.dataset.lang));
});

/* ---------- password toggle ---------- */
const pass = document.getElementById('password');
const toggleBtn = document.getElementById('togglePass');
const eyeIcon = document.getElementById('eyeIcon');
toggleBtn.addEventListener('click', ()=>{
  const show = pass.type === 'password';
  pass.type = show ? 'text' : 'password';
  eyeIcon.innerHTML = show
    ? '<path d="M3 3l18 18M10.6 10.6a3 3 0 0 0 4.24 4.24M9.9 4.24A11 11 0 0 1 12 4c7 0 11 8 11 8a17.6 17.6 0 0 1-3.1 4.14M6.5 6.6C3.9 8.3 2 12 2 12s4 8 11 8c1.4 0 2.65-.32 3.75-.83"/>'
    : '<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/>';
});

/* ---------- card tilt toward cursor ---------- */
const card = document.getElementById('loginForm');
card.addEventListener('pointermove', e=>{
  const r = card.getBoundingClientRect();
  const nx = (e.clientX - r.left) / r.width - 0.5;
  const ny = (e.clientY - r.top) / r.height - 0.5;
  card.style.transform = `perspective(900px) rotateY(${nx*8}deg) rotateX(${-ny*8}deg)`;
});
card.addEventListener('pointerleave', ()=>{
  card.style.transform = 'perspective(900px) rotateY(0deg) rotateX(0deg)';
});

/* ---------- fake submit: spinner -> error/success ---------- */
const btn = document.getElementById('submitBtn');
const errorMsg = document.getElementById('errorMsg');
card.addEventListener('submit', e=>{
  e.preventDefault();
  errorMsg.classList.remove('show');
  btn.classList.add('is-loading');
  setTimeout(()=>{
    btn.classList.remove('is-loading');
    const u = document.getElementById('username').value.trim();
    const p = pass.value.trim();
    if(!u || !p){
      errorMsg.classList.add('show');
    } else {
      btn.querySelector('.btn-label').textContent =
        (document.documentElement.lang === 'tr') ? 'Başarılı ✓' : 'Success ✓';
    }
  }, 1100);
});

/* ---------- ambient fireflies canvas ---------- */
const canvas = document.getElementById('fireflies');
const ctx = canvas.getContext('2d');
let W, H, flies = [];

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const count = window.innerWidth < 500 ? 18 : 34;
for(let i=0;i<count;i++){
  flies.push({
    x: Math.random()*W,
    y: Math.random()*H,
    r: Math.random()*1.6 + 0.6,
    a: Math.random()*Math.PI*2,
    speed: Math.random()*0.35 + 0.08,
    flicker: Math.random()*Math.PI*2
  });
}

function tick(){
  ctx.clearRect(0,0,W,H);
  flies.forEach(f=>{
    f.a += 0.003;
    f.flicker += 0.05;
    f.x += Math.cos(f.a)*f.speed;
    f.y += Math.sin(f.a*1.3)*f.speed*0.6 - 0.05;
    if(f.y < -10) f.y = H+10;
    if(f.x < -10) f.x = W+10;
    if(f.x > W+10) f.x = -10;
    const glow = (Math.sin(f.flicker)+1)/2;
    ctx.beginPath();
    ctx.fillStyle = `rgba(255,200,120,${0.25 + glow*0.55})`;
    ctx.shadowColor = 'rgba(255,180,84,0.9)';
    ctx.shadowBlur = 8 + glow*10;
    ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
    ctx.fill();
  });
  requestAnimationFrame(tick);
}
tick();
</script>
</body>
</html>
