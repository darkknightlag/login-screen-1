<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Premium Login Screen</title>
  <style>
    :root{--bg:#0f172a;--card:#0b1220;--accent:#6366f1;--accent2:#ec4899;--text:#e6eef8}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(135deg,#071029 0%,#0b1220 100%);color:var(--text)}
    .container{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px}
    .card{width:100%;max-width:420px;background:linear-gradient(180deg,rgba(255,255,255,0.03),rgba(255,255,255,0.02));border-radius:12px;padding:28px;box-shadow:0 12px 40px rgba(2,6,23,0.6);backdrop-filter:blur(6px)}
    h1{margin:0 0 8px;font-size:20px}
    p.lead{margin:0 0 18px;color:rgba(230,238,248,0.82)}
    .form-group{margin-bottom:14px}
    .input-wrapper{position:relative}
    input[type=email],input[type=password]{width:100%;padding:12px 40px 12px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.05);background:transparent;color:var(--text);outline:none}
    .toggle-password{position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer}
    .login-btn{width:100%;padding:12px;border-radius:10px;border:none;color:white;background:linear-gradient(90deg,var(--accent),var(--accent2));font-weight:600;cursor:pointer}
    .login-btn.loading{opacity:0.9}
    .social-row{display:flex;gap:10px;margin-top:14px}
    .social-btn{flex:1;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:rgba(255,255,255,0.02);color:var(--text);cursor:pointer}
    .meta{margin-top:12px;text-align:center;font-size:13px;color:rgba(230,238,248,0.6)}
    .error-notification{transition:opacity .2s ease}
    @media (max-width:420px){.card{padding:20px}}
  </style>
</head>
<body>
  <div class="container">
    <main class="card" role="main">
      <h1>Welcome back</h1>
      <p class="lead">Sign in to continue to your account</p>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email" class="sr-only">Email</label>
          <div class="input-wrapper">
            <input id="email" type="email" placeholder="Email" required />
          </div>
        </div>

        <div class="form-group">
          <label for="password" class="sr-only">Password</label>
          <div class="input-wrapper">
            <input id="password" type="password" placeholder="Password" required />
            <button type="button" class="toggle-password" aria-label="Toggle password visibility" onclick="togglePassword()">👁️</button>
          </div>
        </div>

        <div class="form-group">
          <button type="submit" class="login-btn">Login</button>
        </div>

        <div class="social-row">
          <button class="social-btn google">Google</button>
          <button class="social-btn github">GitHub</button>
        </div>
      </form>

      <div class="meta">Don't have an account? <a href="#" style="color:var(--accent)">Sign up</a></div>
    </main>
  </div>

  <script src="./script.js"></script>
</body>
</html>
